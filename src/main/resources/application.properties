# ===============================================================
# CORE APPLICATION
# ===============================================================
spring.application.name=TEA4LIFE-RECOMMENDATION-SERVICE
spring.threads.virtual.enabled=true
server.port=8080
# ===============================================================
# INFRASTRUCTURE & DATA
# ===============================================================
## NoSQl - MongoDB
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.mongodb.representation.uuid=java-legacy
spring.data.mongodb.auto-index-creation=true
### Kafka
# Settings
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVER}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=tea4life.recommendation_service.dto.event
spring.kafka.consumer.properties.spring.json.use.type.headers=true
# Topics
spring.kafka.topic.product-viewed=${PRODUCT_VIEWED_TOPIC:product-viewed-topic}
spring.kafka.topic.product-clicked=${PRODUCT_CLICKED_TOPIC:product-clicked-topic}
spring.kafka.topic.order-placed=${ORDER_PLACED_TOPIC:order-placed-topic}
### Recommendation Settings
recommendation.score.view-weight=${RECOMMENDATION_SCORE_VIEW_WEIGHT:1.0}
recommendation.score.click-weight=${RECOMMENDATION_SCORE_CLICK_WEIGHT:2.0}
recommendation.score.order-weight=${RECOMMENDATION_SCORE_ORDER_WEIGHT:10.0}
recommendation.score.product-association-weight=${RECOMMENDATION_SCORE_PRODUCT_ASSOCIATION_WEIGHT:5.0}
recommendation.score.option-value-association-weight=${RECOMMENDATION_SCORE_OPTION_VALUE_ASSOCIATION_WEIGHT:3.0}
recommendation.popularity.decay-factor=${RECOMMENDATION_POPULARITY_DECAY_FACTOR:0.5}
recommendation.popularity.decay-cron=${RECOMMENDATION_POPULARITY_DECAY_CRON:0 0 0 1 * *}
### Eureka
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
spring.cloud.discovery.enabled=${EUREKA_DISCOVERY_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_SERVICE_URL:}
eureka.instance.prefer-ip-address=${EUREKA_SERVICE_PREFER_IP_ADDRESS:false}
# ===============================================================
# OBSERVABILITY (LOGS & HEALTH)
# ===============================================================
### Actuator
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.status.http-mapping.UP=200
management.endpoint.health.status.http-mapping.DOWN=503
### Logging
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
# ===============================================================
# WEB / MVC CONFIGURATION
# ===============================================================
### Pagination
spring.data.web.pageable.one-indexed-parameters=true
spring.data.web.pageable.max-page-size=20
### JSON
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh
